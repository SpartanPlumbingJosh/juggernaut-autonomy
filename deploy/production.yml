version: '3.8'

services:
  api:
    image: revenue-api:latest
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/revenue
      - PAYMENT_GATEWAY_API_KEY=${PAYMENT_GATEWAY_API_KEY}
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: revenue
    volumes:
      - db-data:/var/lib/postgresql/data

  web:
    image: landing-page:latest
    ports:
      - "80:80"
    environment:
      - API_URL=http://api:8080
    depends_on:
      - api

volumes:
  db-data:
