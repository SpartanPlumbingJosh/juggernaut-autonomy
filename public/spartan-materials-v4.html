<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spartan — Materials</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --blk:#070707;--ink:#0E0E0E;--soot:#151515;--ash:#1C1C1C;--iron:#2A2A2A;
  --steel:#777;--zinc:#999;--tin:#AAA;--fog:#CCC;--cloud:#DDD;--white:#F0F0F0;
  --red:#C41E3A;--redhi:#E8354F;
  --grn:#22C55E;--grn-d:#166534;--grn-bg:rgba(34,197,94,0.05);
  --amb:#EAB308;--amb-bg:rgba(234,179,8,0.05);
  --pink:#FF2D78;--pink-glow:rgba(255,45,120,0.35);--pink-pulse:rgba(255,45,120,0.12);
  --hd:'Bebas Neue',sans-serif;
  --bd:'Outfit',sans-serif;
  --mn:'Fira Code',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--blk);font-family:var(--bd);color:var(--cloud);-webkit-font-smoothing:antialiased;}
body{max-width:740px;margin:0 auto;min-height:100vh;}

/* ─ HEADER ─ */
.hdr{padding:24px 16px 14px;text-align:center;border-bottom:1px solid var(--ash);}
.hdr img{height:90px;display:block;margin:0 auto 8px;}
.hdr-sub{font-family:var(--mn);font-size:10px;color:var(--zinc);letter-spacing:3px;text-transform:uppercase;}

/* ─ JOB BAR ─ */
.jbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--ash);background:var(--ink);}
.jnum{font-family:var(--hd);font-size:26px;color:var(--white);letter-spacing:1px;}
.jnum em{color:var(--red);font-style:normal;}
.jtag{font-family:var(--mn);font-size:10px;font-weight:600;padding:3px 10px;border-radius:3px;text-transform:uppercase;letter-spacing:1px;}
.jtag-i{background:var(--grn-d);color:var(--grn);}
.jtag-s{background:#1E3A5F;color:#60A5FA;}

/* ─ MODES ─ */
.modes{display:flex;border-bottom:1px solid var(--ash);background:var(--ink);}
.mbtn{flex:1;padding:10px;text-align:center;font-family:var(--hd);font-size:15px;letter-spacing:2px;color:var(--steel);background:0;border:0;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;}
.mbtn:hover{color:var(--fog);}
.mbtn.on{color:var(--white);border-bottom-color:var(--red);}

/* ─ PROGRESS ─ */
.prog{padding:12px 16px;border-bottom:1px solid var(--ash);}
.prog-top{display:flex;justify-content:space-between;margin-bottom:6px;}
.prog-l{font-family:var(--hd);font-size:14px;color:var(--zinc);letter-spacing:2px;}
.prog-c{font-family:var(--mn);font-size:12px;font-weight:600;}
.prog-c.dn{color:var(--grn);}
.prog-c.pt{color:var(--pink);}
.prog-bar{height:3px;background:var(--ash);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;transition:width .3s;}
.prog-fill.pt{background:var(--pink);}
.prog-fill.dn{background:var(--grn);}

/* ─ BUDGET ─ */
.bgt{padding:14px 16px;border-bottom:1px solid var(--ash);}
.bgt-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.bgt-pct{font-family:var(--hd);font-size:42px;line-height:1;}
.bgt-pct.ok{color:var(--grn);}
.bgt-pct.wn{color:var(--amb);}
.bgt-pct.ov{color:var(--red);}
.bgt-tgt{font-family:var(--mn);font-size:11px;color:var(--steel);}
.ga{height:5px;background:var(--ash);border-radius:3px;position:relative;margin-bottom:10px;}
.ga-fill{height:100%;border-radius:3px;transition:width .5s;}
.ga-fill.ok{background:var(--grn);}
.ga-fill.wn{background:var(--amb);}
.ga-fill.ov{background:var(--red);}
.ga-mk{position:absolute;top:-2px;width:2px;height:9px;background:var(--fog);border-radius:1px;}
.bgt-row{display:flex;gap:2px;}
.bgt-n{flex:1;text-align:center;padding:7px 4px;background:var(--soot);border-radius:3px;}
.bgt-nv{font-family:var(--mn);font-size:13px;font-weight:600;color:var(--white);}
.bgt-nl{font-family:var(--mn);font-size:8px;color:var(--steel);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

/* ─ TRUCK ─ */
.trk{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--ash);}
.trk-l{font-family:var(--hd);font-size:14px;color:var(--zinc);letter-spacing:2px;}
.trk-in{width:70px;background:var(--soot);border:2px solid var(--pink);border-radius:3px;padding:6px 8px;font-family:var(--mn);font-size:15px;font-weight:700;color:var(--white);text-align:center;outline:0;box-shadow:0 0 8px var(--pink-glow),0 0 20px var(--pink-pulse);animation:pulse-pink 2s ease-in-out infinite;}
.trk-in:focus{border-color:var(--white);box-shadow:0 0 12px var(--pink-glow);animation:none;}
.trk-in.filled{border-color:var(--grn);box-shadow:none;animation:none;}
.trk-in::placeholder{color:var(--zinc);}
.trk-h{font-size:11px;color:var(--zinc);}

/* ─ AI SEARCH (above list) ─ */
.aisearch{padding:12px 16px;border-bottom:1px solid var(--ash);position:relative;}
.aisearch-wrap{display:flex;gap:8px;align-items:center;}
.aisearch-in{flex:1;background:var(--soot);border:1px solid var(--iron);border-radius:6px;padding:10px 14px;font-family:var(--bd);font-size:14px;color:var(--white);outline:0;}
.aisearch-in:focus{border-color:var(--pink);}
.aisearch-in::placeholder{color:var(--steel);}
.aisearch-btn{width:40px;height:40px;border-radius:6px;background:var(--red);border:0;cursor:pointer;color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.aisearch-btn:hover{background:var(--redhi);}
.ai-results{display:none;margin-top:8px;}
.ai-results.show{display:block;}
.ai-result{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;margin-bottom:2px;background:var(--ash);border-radius:4px;cursor:pointer;transition:background .1s;}
.ai-result:hover{background:var(--iron);}
.ai-r-name{font-family:var(--hd);font-size:15px;color:var(--white);letter-spacing:.5px;}
.ai-r-meta{font-family:var(--mn);font-size:10px;color:var(--tin);}
.ai-r-add{padding:4px 12px;background:var(--grn-d);color:var(--grn);border:0;border-radius:3px;font-family:var(--mn);font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;}
.ai-hint{font-size:11px;color:var(--steel);padding:4px 0;}

/* ─ ACTIONS ─ */
.acts{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid var(--ash);}
.abtn{flex:1;padding:11px;border-radius:5px;font-family:var(--hd);font-size:15px;letter-spacing:1px;border:0;cursor:pointer;text-align:center;transition:.1s;}
.abtn:active{transform:scale(.97);}
.abtn-r{background:var(--red);color:#fff;}
.abtn-r:hover{background:var(--redhi);}
.abtn-r:disabled{background:var(--iron);color:var(--steel);cursor:not-allowed;transform:none;}
.abtn-g{background:var(--grn-d);color:var(--grn);}

/* ─ BOBBING TICKER ─ */
.ticker{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 16px;margin:0;
  animation:bob 1.8s ease-in-out infinite;
}
.ticker.hide{display:none;}
@keyframes bob{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}
.ticker-arrow{font-size:18px;color:var(--pink);animation:pulse-pink 2s ease-in-out infinite;}
.ticker-txt{font-family:var(--hd);font-size:15px;color:var(--pink);letter-spacing:1.5px;text-shadow:0 0 12px var(--pink-pulse);}

/* ─ CATEGORY ─ */
.cat-hdr{
  padding:10px 16px;background:var(--ink);border-bottom:1px solid var(--ash);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;cursor:pointer;
}
.cat-title{font-family:var(--hd);font-size:18px;color:var(--white);letter-spacing:1px;}
.cat-count{font-family:var(--mn);font-size:11px;color:var(--steel);}
.cat-items{overflow:hidden;transition:max-height .3s ease;}

/* ─ ITEM ─ */
.itm{border-bottom:1px solid var(--ash);transition:background .15s;}
.itm.chk{background:var(--grn-bg);}
.itm-main{display:flex;align-items:center;padding:11px 16px;gap:10px;}

/* ─ CHECKBOX with pink glow ─ */
.itm-chk{
  flex-shrink:0;width:26px;height:26px;border-radius:5px;
  border:2px solid var(--pink);background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;position:relative;
  box-shadow:0 0 8px var(--pink-glow), 0 0 20px var(--pink-pulse);
  animation:pulse-pink 2s ease-in-out infinite;
}
@keyframes pulse-pink{
  0%,100%{box-shadow:0 0 6px var(--pink-glow),0 0 16px var(--pink-pulse);}
  50%{box-shadow:0 0 12px var(--pink-glow),0 0 30px var(--pink-pulse),0 0 50px rgba(255,45,120,0.06);}
}
.itm-chk:hover{border-color:var(--white);box-shadow:0 0 12px var(--pink-glow);}
.itm-chk.dn{
  border-color:var(--grn);background:var(--grn);
  box-shadow:none;animation:none;
}
.itm-chk.dn::after{content:'✓';color:var(--blk);font-size:15px;font-weight:800;}

/* ─ ITEM IMAGE ─ */
.itm-img{
  flex-shrink:0;width:46px;height:46px;border-radius:4px;
  background:var(--soot);border:1px solid var(--ash);overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.itm-img img{width:100%;height:100%;object-fit:cover;}
.itm-img-ph{font-size:11px;color:var(--zinc);font-family:var(--mn);}

.itm-mid{flex:1;min-width:0;cursor:pointer;}
.itm-name{font-family:var(--hd);font-size:17px;color:var(--white);letter-spacing:.5px;line-height:1.15;}
.itm.chk .itm-name{color:var(--grn);}
.itm-lee{font-family:var(--mn);font-size:10px;color:var(--tin);margin-top:1px;}

.itm-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.qw{display:flex;align-items:center;background:var(--soot);border:1px solid var(--iron);border-radius:4px;overflow:hidden;height:28px;}
.qb{width:24px;height:28px;background:0;border:0;color:var(--tin);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qb:hover{background:var(--ash);color:var(--white);}
.qv{width:30px;height:28px;text-align:center;background:var(--ink);border:0;border-left:1px solid var(--iron);border-right:1px solid var(--iron);font-family:var(--mn);font-size:12px;font-weight:700;color:var(--white);outline:0;}
.qv::-webkit-inner-spin-button{-webkit-appearance:none;}
.itm-price{font-family:var(--mn);font-size:13px;font-weight:600;color:var(--white);min-width:54px;text-align:right;}

/* ─ ITEM DETAIL (dropdown) ─ */
.itm-det{display:none;padding:0 16px 10px 100px;font-size:12px;line-height:1.5;}
.itm-det.open{display:block;}
.itm-det-r{display:flex;gap:6px;margin-bottom:2px;}
.itm-det-l{color:var(--steel);min-width:50px;flex-shrink:0;font-weight:600;text-transform:uppercase;font-size:9px;letter-spacing:.5px;padding-top:1px;}
.itm-det-v{color:var(--fog);}

/* ─ CONFIRMED BY ─ */
.itm-conf{display:none;padding:3px 16px 8px 100px;}
.itm-conf.show{display:flex;align-items:center;gap:5px;}
.conf-dot{width:5px;height:5px;border-radius:50%;background:var(--grn);}
.conf-txt{font-family:var(--mn);font-size:10px;color:var(--grn);}

/* ─ RECON ─ */
.recon{display:none;padding-bottom:40px;}
.recon.on{display:block;}
.review{display:block;}
.review.off{display:none;}
.rc-stats{display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:14px 16px;border-bottom:1px solid var(--ash);}
.rc-st{text-align:center;padding:12px 6px;background:var(--soot);border-radius:3px;}
.rc-sv{font-family:var(--mn);font-size:20px;font-weight:700;}
.rc-sv.ok{color:var(--grn);}
.rc-sv.bad{color:var(--red);}
.rc-sl{font-family:var(--mn);font-size:8px;color:var(--steel);text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}
.rc-verdict{margin:14px 16px;padding:12px;border-radius:5px;text-align:center;font-family:var(--hd);font-size:17px;letter-spacing:1px;}
.rc-verdict.pass{background:var(--grn-bg);color:var(--grn);border:1px solid rgba(34,197,94,.15);}
.rc-verdict.fail{background:rgba(196,30,58,.06);color:var(--red);border:1px solid rgba(196,30,58,.15);}
.rc-verdict.warn{background:var(--amb-bg);color:var(--amb);border:1px solid rgba(234,179,8,.15);}
.rc-item{display:flex;align-items:center;padding:9px 16px;gap:8px;border-bottom:1px solid var(--ash);}
.rc-iname{flex:1;font-family:var(--hd);font-size:14px;color:var(--cloud);letter-spacing:.5px;}
.rc-iqty{font-family:var(--mn);font-size:12px;color:var(--tin);min-width:28px;text-align:center;}
.rc-icost{font-family:var(--mn);font-size:12px;font-weight:600;color:var(--white);min-width:56px;text-align:right;}

.footer-pad{height:20px;}

@media(max-width:480px){
  .itm-img{width:38px;height:38px;}
  .itm-det{padding-left:90px;}
  .itm-conf{padding-left:90px;}
  .bgt-pct{font-size:34px;}
  .hdr img{height:72px;}
}
</style>
</head>

// DATA
// ═══════════════════

// Category ordering
const CAT_ORDER = ["Water Heaters","Valves","PEX","CPVC","Fixtures","General"];

let S={mode:'review',data:null,mats:[],user:null};

function init(){
  const d=window.SPARTAN_DATA||DEMO;
  S.data=d;
  S.mats=d.materials.map((m,i)=>({...m,_i:i,_chk:false,_qty:m.qty,_by:null,_at:null,_open:false}));
  const p=new URLSearchParams(location.search);
  if(p.get('user'))S.user={name:p.get('user'),id:p.get('user_id')||''};
  renderJob();renderBudget();renderCats();renderRecon();updProg();updSend();
  // Truck # glow control
  const trkEl=document.getElementById('trkIn');
  trkEl.addEventListener('input',function(){this.classList.toggle('filled',this.value.trim().length>0);});
}

function needUser(){
  if(S.user)return true;
  const n=prompt('Your name (for sign-off):');
  if(!n||!n.trim())return false;
  S.user={name:n.trim(),id:''};return true;
}

function setMode(m,el){
  S.mode=m;
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('revPane').className=m==='review'?'review':'review off';
  document.getElementById('recPane').className=m==='recon'?'recon on':'recon';
}

function renderJob(){
  const d=S.data;
  document.getElementById('jNum').textContent=d.job_number||d.st_job_id;
  const t=document.getElementById('jTag');
  t.textContent=(d.track_type||'—').toUpperCase();
  t.className='jtag '+(d.track_type==='install'?'jtag-i':'jtag-s');
}

function renderBudget(){
  const tot=calcTot(),sold=+(S.data.sold_amount)||0,bud=sold*.18,pct=sold>0?(tot/sold)*100:0;
  const c=pct>18?'ov':pct>15?'wn':'ok';
  const el=document.getElementById('bP');el.textContent=pct.toFixed(1)+'%';el.className='bgt-pct '+c;
  const f=document.getElementById('gF');f.style.width=Math.min((pct/18)*100,140)+'%';f.className='ga-fill '+c;
  document.getElementById('bS').textContent='$'+fmt(sold);
  document.getElementById('bB').textContent='$'+fmt(bud);
  document.getElementById('bC').textContent='$'+fmt(tot);
}

function renderCats(){
  const groups={};
  S.mats.forEach((m,i)=>{const c=m.cat||'Other';if(!groups[c])groups[c]=[];groups[c].push(i);});
  const cats=CAT_ORDER.filter(c=>groups[c]).concat(Object.keys(groups).filter(c=>!CAT_ORDER.includes(c)));
  const wrap=document.getElementById('catList');wrap.innerHTML='';

  cats.forEach(cat=>{
    const idxs=groups[cat];
    const sec=document.createElement('div');
    sec.innerHTML=`<div class="cat-hdr"><div class="cat-title">${esc(cat)}</div><div class="cat-count">${idxs.length} items</div></div>`;
    const items=document.createElement('div');items.className='cat-items';

    idxs.forEach(i=>{
      const m=S.mats[i];
      const d=document.createElement('div');
      d.className='itm'+(m._chk?' chk':'');d.id='itm-'+i;
      d.innerHTML=`
        <div class="itm-main">
          <div class="itm-chk${m._chk?' dn':''}" onclick="event.stopPropagation();togChk(${i})"></div>
          <div class="itm-img">${m.img?'<img src="'+esc(m.img)+'">':'<div class="itm-img-ph">IMG</div>'}</div>
          <div class="itm-mid" onclick="togDet(${i})">
            <div class="itm-name">${esc(m.name)}</div>
            <div class="itm-lee">Lee #${esc(m.lee||'—')}</div>
          </div>
          <div class="itm-right">
            <div class="qw">
              <button class="qb" onclick="event.stopPropagation();cQ(${i},-1)">−</button>
              <input class="qv" type="number" value="${m._qty}" min="0" max="999" onchange="sQ(${i},this.value)" onclick="event.stopPropagation()">
              <button class="qb" onclick="event.stopPropagation();cQ(${i},1)">+</button>
            </div>
            <div class="itm-price" id="pr-${i}">$${fn(m._qty*m.unit)}</div>
          </div>
        </div>
        <div class="itm-det${m._open?' open':''}" id="det-${i}">
          <div class="itm-det-r"><div class="itm-det-l">FULL</div><div class="itm-det-v">${esc(m.desc)}</div></div>
          <div class="itm-det-r"><div class="itm-det-l">UNIT</div><div class="itm-det-v">$${fn(m.unit)}</div></div>
          ${m.notes?'<div class="itm-det-r"><div class="itm-det-l">NOTE</div><div class="itm-det-v">'+esc(m.notes)+'</div></div>':''}
        </div>
        <div class="itm-conf${m._chk?' show':''}" id="cf-${i}">
          <div class="conf-dot"></div>
          <div class="conf-txt" id="cft-${i}">${m._by?esc(m._by)+' · '+ft(m._at):''}</div>
        </div>`;
      items.appendChild(d);
    });
    sec.appendChild(items);wrap.appendChild(sec);
  });
}

function renderRecon(){
  const tot=calcTot(),sold=+(S.data.sold_amount)||0,bud=sold*.18,pct=sold>0?(tot/sold)*100:0;
  document.getElementById('rI').textContent=S.mats.length;
  document.getElementById('rB').textContent='$'+fmt(bud);
  document.getElementById('rS').textContent='$'+fmt(tot);
  const rp=document.getElementById('rP');rp.textContent=pct.toFixed(1)+'%';rp.className='rc-sv '+(pct>18?'bad':'ok');
  const v=document.getElementById('rV');
  if(pct>18){v.className='rc-verdict fail';v.textContent='OVER BUDGET — '+pct.toFixed(1)+'%';}
  else if(pct>15){v.className='rc-verdict warn';v.textContent='CLOSE TO LIMIT — '+pct.toFixed(1)+'%';}
  else{v.className='rc-verdict pass';v.textContent='UNDER BUDGET — '+pct.toFixed(1)+'%';}

  const rl=document.getElementById('recList');rl.innerHTML='';
  const groups={};
  S.mats.forEach(m=>{const c=m.cat||'Other';if(!groups[c])groups[c]=[];groups[c].push(m);});
  const cats=CAT_ORDER.filter(c=>groups[c]).concat(Object.keys(groups).filter(c=>!CAT_ORDER.includes(c)));
  cats.forEach(cat=>{
    const hdr=document.createElement('div');
    hdr.className='cat-hdr';hdr.style.cursor='default';
    hdr.innerHTML=`<div class="cat-title">${esc(cat)}</div>`;
    rl.appendChild(hdr);
    groups[cat].forEach(m=>{
      const r=document.createElement('div');r.className='rc-item';
      r.innerHTML=`<div class="rc-iname">${esc(m.name)}</div><div class="rc-iqty">×${m._qty}</div><div class="rc-icost">$${fn(m._qty*m.unit)}</div>`;
      rl.appendChild(r);
    });
  });
}

// ── INTERACTIONS ──
function togChk(i){
  if(!S.mats[i]._chk){
    if(!needUser())return;
    S.mats[i]._chk=true;S.mats[i]._by=S.user.name;S.mats[i]._at=new Date();
  }else{S.mats[i]._chk=false;S.mats[i]._by=null;S.mats[i]._at=null;}
  const el=document.getElementById('itm-'+i),chk=el.querySelector('.itm-chk'),cf=document.getElementById('cf-'+i);
  if(S.mats[i]._chk){
    el.classList.add('chk');chk.classList.add('dn');cf.classList.add('show');
    document.getElementById('cft-'+i).textContent=S.mats[i]._by+' · '+ft(S.mats[i]._at);
  }else{el.classList.remove('chk');chk.classList.remove('dn');cf.classList.remove('show');}
  updProg();updSend();
}
function togDet(i){S.mats[i]._open=!S.mats[i]._open;document.getElementById('det-'+i).classList.toggle('open');}
function cQ(i,d){S.mats[i]._qty=Math.max(0,Math.min(999,S.mats[i]._qty+d));rQ(i);}
function sQ(i,v){S.mats[i]._qty=Math.max(0,Math.min(999,parseInt(v)||0));rQ(i);}
function rQ(i){
  document.getElementById('itm-'+i).querySelector('.qv').value=S.mats[i]._qty;
  document.getElementById('pr-'+i).textContent='$'+fn(S.mats[i]._qty*S.mats[i].unit);
  renderBudget();renderRecon();
}
function updProg(){
  const t=S.mats.length,c=S.mats.filter(m=>m._chk).length,p=t>0?(c/t)*100:0,dn=c===t&&t>0;
  document.getElementById('pC').textContent=c+' / '+t;
  document.getElementById('pC').className='prog-c '+(dn?'dn':'pt');
  document.getElementById('pF').style.width=p+'%';
  document.getElementById('pF').className='prog-fill '+(dn?'dn':'pt');
  // hide ticker when all checked
  const tk=document.getElementById('ticker');
  if(tk)tk.className=dn?'ticker hide':'ticker';
}
function updSend(){
  const all=S.mats.every(m=>m._chk),btn=document.getElementById('sendBtn');
  btn.disabled=!all;
  btn.textContent=all?'SEND TO LEE SUPPLY':S.mats.filter(m=>!m._chk).length+' LEFT TO REVIEW';
}
function sendLee(){
  const trk=document.getElementById('trkIn').value.trim();
  if(!trk&&!confirm('No truck number. Send anyway?'))return;
  const payload={st_job_id:S.data.st_job_id,truck_number:trk,track_type:S.data.track_type,
    reviewed_by:S.user?.name||'unknown',
    materials:S.mats.map(m=>({lee:m.lee,name:m.name,desc:m.desc,qty:m._qty,unit:m.unit,confirmed_by:m._by,confirmed_at:m._at?.toISOString()})),
    total:calcTot(),sent_at:new Date().toISOString()};
  console.log('📦 SEND:',JSON.stringify(payload,null,2));
  alert('Sent to Lee Supply\nTruck #'+(trk||'—')+'\n'+S.mats.length+' items · $'+fmt(calcTot()));
}

function aiGo(){
  const q=document.getElementById('aiIn').value.trim();if(!q)return;
  const res=document.getElementById('aiRes');res.classList.add('show');
  const terms=q.toLowerCase().split(/\s+/);
  const hits=CATALOG.filter(c=>{const t=(c.name+' '+c.desc+' '+c.cat+' '+c.lee+' '+c.notes).toLowerCase();return terms.every(w=>t.includes(w));}).slice(0,6);
  if(!hits.length){res.innerHTML='<div class="ai-hint">Nothing for "'+esc(q)+'" — try different terms</div>';res._hits=[];return;}
  let h='<div class="ai-hint">'+hits.length+' found:</div>';
  hits.forEach((r,i)=>{h+=`<div class="ai-result" onclick="addHit(${i})"><div><div class="ai-r-name">${esc(r.name)}</div><div class="ai-r-meta">#${esc(r.lee)} · $${fn(r.unit)}</div></div><button class="ai-r-add">+ ADD</button></div>`;});
  res.innerHTML=h;res._hits=hits;
}
function addHit(i){
  const res=document.getElementById('aiRes');const r=res._hits?.[i];if(!r)return;
  S.mats.push({...r,_i:S.mats.length,_chk:false,_qty:r.qty||1,_by:null,_at:null,_open:false});
  document.getElementById('aiIn').value='';res.classList.remove('show');
  renderCats();renderBudget();renderRecon();updProg();updSend();
}
document.addEventListener('keydown',e=>{
  if(e.target.id==='aiIn'&&e.key==='Enter'&&!e.shiftKey){e.preventDefault();aiGo();}
});

// ── UTILS ──
function calcTot(){return S.mats.reduce((s,m)=>s+(m._qty*(+m.unit||0)),0);}
function fmt(n){return(+n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fn(n){return(+n||0).toFixed(2);}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function ft(d){if(!d)return'';return(d.getHours()%12||12)+':'+String(d.getMinutes()).padStart(2,'0')+(d.getHours()>=12?'p':'a');}
